version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: magicurl-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magicurl-app
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/magicurl
      - NODE_ENV=production
    ports:
      - "3000:3000"
    # In production you might prefer a reverse proxy in front

volumes:
  mongo_data: {}

